<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dawcore — metronome demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0d4c8;
      padding: 24px;
      max-width: 600px;
    }
    h1 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 0.95rem;
      color: #888;
      margin: 0 0 10px 0;
      font-weight: normal;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    button {
      cursor: pointer;
      background: #1a1a2e;
      color: #e0d4c8;
      border: 1px solid currentColor;
      padding: 6px 14px;
      font: inherit;
      font-size: 0.9rem;
    }
    button:hover { opacity: 0.8; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.active {
      background: #63C75F;
      color: #0f0f1a;
      border-color: #63C75F;
    }
    .tempo-display {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      color: #c49a6c;
      margin: 16px 0;
    }
    .tempo-display span {
      font-size: 0.8rem;
      color: #888;
    }
    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .presets button {
      font-size: 0.8rem;
      padding: 4px 10px;
    }
    .presets button.selected {
      background: #c49a6c;
      color: #0f0f1a;
      border-color: #c49a6c;
    }
    label {
      font-size: 0.85rem;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    input[type="range"] {
      width: 200px;
      accent-color: #63C75F;
    }
    .section {
      margin-bottom: 20px;
    }
    .beat-indicator {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }
    .beat-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 2px solid #444;
      transition: background 0.05s, border-color 0.05s;
    }
    .beat-dot.accent {
      border-color: #d08070;
    }
    .beat-dot.active {
      background: #63C75F;
      border-color: #63C75F;
    }
    .beat-dot.active.accent {
      background: #d08070;
      border-color: #d08070;
    }
    #position {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
    }
    .divider {
      border: none;
      border-top: 1px solid #2a2a3e;
      margin: 24px 0;
    }
    .sequence-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .sequence-grid button {
      font-size: 0.85rem;
      padding: 6px 14px;
    }
    .sequence-grid button.active {
      background: #63C75F;
      color: #0f0f1a;
      border-color: #63C75F;
    }
    .sequence-desc {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #666;
      min-height: 1.4em;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>metronome demo</h1>

  <div class="tempo-display" id="tempo-display">120 <span>BPM</span></div>

  <div class="section">
    <label>Tempo</label>
    <input type="range" id="tempo-slider" min="40" max="240" value="120" />
  </div>

  <div class="section">
    <label>Presets</label>
    <div class="presets" id="presets">
      <button data-bpm="60">60 — Largo</button>
      <button data-bpm="80">80 — Adagio</button>
      <button data-bpm="100">100 — Andante</button>
      <button data-bpm="120" class="selected">120 — Allegro</button>
      <button data-bpm="140">140 — Vivace</button>
      <button data-bpm="160">160 — Presto</button>
      <button data-bpm="200">200 — Prestissimo</button>
    </div>
  </div>

  <div class="section">
    <label>Time Signature</label>
    <div class="presets" id="time-sigs">
      <button data-beats="2">2/4</button>
      <button data-beats="3">3/4</button>
      <button data-beats="4" class="selected">4/4</button>
      <button data-beats="5">5/4</button>
      <button data-beats="6">6/8</button>
      <button data-beats="7">7/8</button>
    </div>
  </div>

  <div class="beat-indicator" id="beat-indicator"></div>
  <div id="position"></div>

  <div class="controls">
    <button id="play-btn">Play</button>
    <button id="stop-btn" disabled>Stop</button>
  </div>

  <hr class="divider" />

  <div class="section">
    <h2>Sequences</h2>
    <div class="sequence-grid" id="sequence-grid"></div>
    <div class="sequence-desc" id="sequence-desc"></div>
  </div>

  <script type="module">
    import { Transport } from '@dawcore/transport';

    const audioCtx = new AudioContext({ sampleRate: 48000 });
    const transport = new Transport(audioCtx, { tempo: 120, numerator: 4, denominator: 4 });

    let beatsPerBar = 4;
    let denominator = 4;
    let isPlaying = false;
    let activeSequence = null;

    // --- Generate click sounds ---
    function createClickBuffer(frequency, duration, gain) {
      const length = Math.floor(audioCtx.sampleRate * duration);
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        const t = i / audioCtx.sampleRate;
        const envelope = Math.exp(-t * 40);
        data[i] = Math.sin(2 * Math.PI * frequency * t) * envelope * gain;
      }
      return buffer;
    }

    const accentClick = createClickBuffer(1200, 0.05, 0.8);
    const normalClick = createClickBuffer(800, 0.04, 0.5);

    transport.setMetronomeClickSounds(accentClick, normalClick);
    transport.setMetronomeEnabled(true);

    // --- UI Elements ---
    const tempoSlider = document.getElementById('tempo-slider');
    const tempoDisplay = document.getElementById('tempo-display');
    const presetsEl = document.getElementById('presets');
    const timeSigsEl = document.getElementById('time-sigs');
    const beatIndicator = document.getElementById('beat-indicator');
    const positionEl = document.getElementById('position');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const sequenceGrid = document.getElementById('sequence-grid');
    const sequenceDesc = document.getElementById('sequence-desc');

    // --- Beat dots ---
    function buildBeatDots(n) {
      while (beatIndicator.firstChild) beatIndicator.removeChild(beatIndicator.firstChild);
      for (let i = 0; i < n; i++) {
        const dot = document.createElement('div');
        dot.className = 'beat-dot' + (i === 0 ? ' accent' : '');
        beatIndicator.appendChild(dot);
      }
    }
    buildBeatDots(beatsPerBar);

    // --- Tempo display helper ---
    function updateTempoDisplay(bpm) {
      tempoDisplay.textContent = '';
      tempoDisplay.appendChild(document.createTextNode(bpm + ' '));
      const span = document.createElement('span');
      span.textContent = 'BPM';
      tempoDisplay.appendChild(span);
    }

    // --- Tempo ---
    function setTempo(bpm) {
      transport.setTempo(bpm);
      tempoSlider.value = bpm;
      updateTempoDisplay(bpm);
      presetsEl.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('selected', Number(btn.dataset.bpm) === bpm);
      });
    }

    tempoSlider.addEventListener('input', () => setTempo(Number(tempoSlider.value)));

    presetsEl.addEventListener('click', (e) => {
      if (e.target.dataset.bpm) setTempo(Number(e.target.dataset.bpm));
    });

    // --- Time signature ---
    timeSigsEl.addEventListener('click', (e) => {
      if (!e.target.dataset.beats) return;
      beatsPerBar = Number(e.target.dataset.beats);
      denominator = beatsPerBar >= 6 ? 8 : 4;
      transport.setMeter(beatsPerBar, denominator);
      buildBeatDots(beatsPerBar);
      timeSigsEl.querySelectorAll('button').forEach(btn => {
        btn.classList.toggle('selected', Number(btn.dataset.beats) === beatsPerBar);
      });
    });

    // --- Play/Stop helpers ---
    function uiSetPlaying(playing) {
      isPlaying = playing;
      playBtn.disabled = playing;
      stopBtn.disabled = !playing;
      playBtn.classList.toggle('active', playing);
      if (!playing) {
        beatIndicator.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active'));
        positionEl.textContent = '';
      }
    }

    // --- Play / Stop ---
    playBtn.addEventListener('click', async () => {
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      transport.play();
      uiSetPlaying(true);
    });

    stopBtn.addEventListener('click', () => {
      transport.stop();
      activeSequence = null;
      sequenceGrid.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      sequenceDesc.textContent = '';
      uiSetPlaying(false);
    });

    // --- Animation loop: update beat indicator ---
    function tick() {
      if (isPlaying) {
        const time = transport.getCurrentTime();
        const currentTick = transport.timeToTick(time);
        const meter = transport.getMeter(currentTick);
        const currentNumerator = meter.numerator;
        const currentDenominator = meter.denominator;

        // Rebuild dots if numerator changed
        const dotCount = beatIndicator.childElementCount;
        if (dotCount !== currentNumerator) {
          buildBeatDots(currentNumerator);
        }

        // Use tick-based position for accurate beat tracking across meter changes.
        const bar = transport.tickToBar(currentTick);
        const barStartTick = transport.barToTick(bar);
        const tickIntoBar = currentTick - barStartTick;
        const ticksPerBeat = 960 * (4 / currentDenominator);
        const currentBeat = Math.floor(tickIntoBar / ticksPerBeat);

        const dots = beatIndicator.querySelectorAll('.beat-dot');
        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === currentBeat);
        });

        const beat = currentBeat + 1;
        positionEl.textContent = 'Bar ' + bar + ' \u00B7 Beat ' + beat;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // --- Sequence definitions ---
    const SEQUENCES = [
      {
        id: 'rock',
        label: 'Rock 4/4',
        description: '4/4 at 120 BPM, 8 bars',
        setup(t) {
          t.clearMeters();
          t.clearTempos();
          t.setTempo(120);
          t.setMeter(4, 4);
          t.setLoop(true, 0, t.tickToTime(t.barToTick(9)));
        },
        displayNumerator: 4,
        displayDenominator: 4,
        displayTempo: 120,
      },
      {
        id: 'waltz',
        label: 'Jazz Waltz',
        description: '3/4 at 140 BPM, 8 bars',
        setup(t) {
          t.clearMeters();
          t.clearTempos();
          t.setTempo(140);
          t.setMeter(3, 4);
          t.setLoop(true, 0, t.tickToTime(t.barToTick(9)));
        },
        displayNumerator: 3,
        displayDenominator: 4,
        displayTempo: 140,
      },
      {
        id: 'progressive',
        label: 'Progressive',
        description: 'bars 1-2: 4/4 · bars 3-4: 7/8 · bars 5-6: 4/4 · bars 7-8: 3/4 @ 100 BPM',
        setup(t) {
          t.clearMeters();
          t.clearTempos();
          t.setTempo(100);
          t.setMeter(4, 4);
          t.setMeter(7, 8, t.barToTick(3));
          t.setMeter(4, 4, t.barToTick(5));
          t.setMeter(3, 4, t.barToTick(7));
          t.setLoop(true, 0, t.tickToTime(t.barToTick(9)));
        },
        displayNumerator: 4,
        displayDenominator: 4,
        displayTempo: 100,
      },
      {
        id: 'balkan',
        label: 'Balkan',
        description: 'bars 1-2: 7/8 · bars 3-4: 11/8 · bars 5-6: 7/8 · bars 7-8: 9/8 @ 160 BPM',
        setup(t) {
          t.clearMeters();
          t.clearTempos();
          t.setTempo(160);
          t.setMeter(7, 8);
          t.setMeter(11, 8, t.barToTick(3));
          t.setMeter(7, 8, t.barToTick(5));
          t.setMeter(9, 8, t.barToTick(7));
          t.setLoop(true, 0, t.tickToTime(t.barToTick(9)));
        },
        displayNumerator: 7,
        displayDenominator: 8,
        displayTempo: 160,
      },
      {
        id: 'accelerando',
        label: 'Accelerando',
        description: '4/4 at 80 BPM · tempo jump to 120 at bar 5',
        setup(t) {
          t.clearMeters();
          t.clearTempos();
          t.setMeter(4, 4);
          t.setTempo(80);
          t.setTempo(120, t.barToTick(5));
          t.setLoop(true, 0, t.tickToTime(t.barToTick(9)));
        },
        displayNumerator: 4,
        displayDenominator: 4,
        displayTempo: 80,
      },
    ];

    // --- Build sequence buttons ---
    SEQUENCES.forEach((seq) => {
      const btn = document.createElement('button');
      btn.textContent = seq.label;
      btn.dataset.seqId = seq.id;
      btn.addEventListener('click', async () => {
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        // Stop and reset
        transport.stop();

        // Apply the sequence
        seq.setup(transport);

        // Update free-play UI to reflect bar 1 meter/tempo
        beatsPerBar = seq.displayNumerator;
        denominator = seq.displayDenominator;
        buildBeatDots(beatsPerBar);
        tempoSlider.value = seq.displayTempo;
        updateTempoDisplay(seq.displayTempo);
        presetsEl.querySelectorAll('button').forEach(b => {
          b.classList.toggle('selected', Number(b.dataset.bpm) === seq.displayTempo);
        });
        timeSigsEl.querySelectorAll('button').forEach(b => b.classList.remove('selected'));

        // Mark active sequence button
        activeSequence = seq.id;
        sequenceGrid.querySelectorAll('button').forEach(b => {
          b.classList.toggle('active', b.dataset.seqId === seq.id);
        });
        sequenceDesc.textContent = seq.description;

        // Start playing
        transport.play();
        uiSetPlaying(true);
      });
      sequenceGrid.appendChild(btn);
    });
  </script>
</body>
</html>
